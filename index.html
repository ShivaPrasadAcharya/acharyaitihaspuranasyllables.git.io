<!DOCTYPE html>
<html lang="sa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>आचार्यस्तरीयः पाठ्यक्रमः – इतिहासपुराणम्</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<script src="syllables.js"></script>
<style>
  :root {
    --saffron:    #C45E0A;
    --deep-gold:  #8B5E0A;
    --gold:       #D4943A;
    --gold-light: #F2C97E;
    --cream:      #FDF6E8;
    --parchment:  #F5E8C8;
    --brown:      #3B1F0A;
    --brown-mid:  #5C3310;
    --red-accent: #8B1A1A;
    --border:     #C9A96E;
    --shadow:     rgba(59,31,10,0.18);
    --text:       #2A1505;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Noto Serif Devanagari', serif;
    line-height: 1.8;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, var(--brown) 0%, var(--brown-mid) 60%, var(--deep-gold) 100%);
    color: var(--gold-light);
    text-align: center;
    padding: .6rem 2rem .55rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A96E' fill-opacity='0.07'%3E%3Cpath d='M30 0L60 30 30 60 0 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
    pointer-events: none;
  }
  /* Inline layout: ॐ · title · subtitle all on one compact line */
  header .header-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .55rem;
    flex-wrap: wrap;
    position: relative; z-index: 1;
  }
  header .om {
    font-size: 1.35rem;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 8px var(--gold), 0 1px 4px rgba(0,0,0,.5);
    animation: glow 3s ease-in-out infinite alternate;
    flex-shrink: 0;
  }
  @keyframes glow {
    from { text-shadow: 0 0 4px var(--gold), 0 1px 4px rgba(0,0,0,.5); }
    to   { text-shadow: 0 0 12px var(--gold-light), 0 1px 4px rgba(0,0,0,.5); }
  }
  header h1 {
    font-size: clamp(.95rem, 2.2vw, 1.2rem);
    font-weight: 700;
    letter-spacing: .03em;
    color: var(--gold-light);
    text-shadow: 0 1px 4px rgba(0,0,0,.4);
    margin: 0;
    line-height: 1.2;
  }
  header .hd-sep {
    color: var(--border);
    font-size: .9rem;
    flex-shrink: 0;
  }
  header h2 {
    font-size: clamp(.82rem, 1.8vw, 1rem);
    font-weight: 400;
    color: var(--gold);
    margin: 0;
    line-height: 1.2;
  }

  /* ── LAYOUT ─────────────────────────────────────────────────── */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 1.2rem 4rem; }

  /* ── NAV ─────────────────────────────────────────────────────── */
  nav {
    background: var(--brown);
    position: sticky; top: 0; z-index: 150;
    border-bottom: 3px solid var(--gold);
    /* Must NOT be overflow:hidden/auto — that clips the dropdown */
    overflow: visible;
    white-space: nowrap;
    /* Inner scroll handled by wrapper below */
  }
  /* Scrollable inner strip that doesn't clip the dropdown */
  nav .nav-scroll {
    overflow-x: auto;
    overflow-y: visible;
    white-space: nowrap;
    scrollbar-width: none;
  }
  nav .nav-scroll::-webkit-scrollbar { display: none; }
  nav a {
    display: inline-block;
    color: var(--gold-light);
    text-decoration: none;
    padding: .7rem 1.1rem;
    font-size: .88rem;
    font-family: 'Noto Sans Devanagari', sans-serif;
    transition: background .2s, color .2s;
  }
  nav a:hover { background: var(--deep-gold); color: #fff; }

  /* Scroll-offset so sticky bars don't cover headings */
  section, [id] {
    scroll-margin-top: 140px;
  }

  /* ── SECTIONS ────────────────────────────────────────────────── */
  section { margin-top: 2.5rem; }
  .section-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 3px 16px var(--shadow);
    margin-bottom: 2rem;
    animation: fadeUp .5s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .section-card:nth-child(2) { animation-delay:.08s; }
  .section-card:nth-child(3) { animation-delay:.16s; }
  .section-card:nth-child(4) { animation-delay:.24s; }
  .section-card:nth-child(5) { animation-delay:.32s; }

  .card-header {
    background: linear-gradient(90deg, var(--brown) 0%, var(--brown-mid) 100%);
    color: var(--gold-light);
    padding: 1rem 1.5rem;
    display: flex; align-items: center; gap: .7rem;
    cursor: pointer;
    user-select: none;
  }
  .card-header h3 { font-size: 1.05rem; font-weight: 600; flex: 1; }
  .card-header .toggle {
    font-size: 1.1rem; color: var(--gold); transition: transform .3s;
    flex-shrink: 0;
  }
  .card-header.open .toggle { transform: rotate(180deg); }
  .card-body { padding: 1.5rem; display: none; }
  .card-body.open { display: block; }

  /* ── TYPOGRAPHY ──────────────────────────────────────────────── */
  h4 {
    color: var(--brown);
    font-size: 1rem;
    font-weight: 600;
    margin: 1.2rem 0 .5rem;
    padding-left: .6rem;
    border-left: 3px solid var(--gold);
  }
  p { margin-bottom: .9rem; font-size: .96rem; }
  ul { padding-left: 1.4rem; margin-bottom: .9rem; }
  li { margin-bottom: .3rem; font-size: .94rem; }

  /* ── TABLES ──────────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; margin: 1rem 0; }
  table {
    width: 100%; border-collapse: collapse;
    font-size: .9rem;
  }
  th {
    background: var(--brown);
    color: var(--gold-light);
    padding: .6rem .9rem;
    text-align: center;
    font-weight: 600;
  }
  td {
    border: 1px solid #ddd;
    padding: .55rem .9rem;
    vertical-align: top;
  }
  tr:nth-child(even) td { background: #fdf3e3; }
  tr.total-row td {
    background: #f0e0c0;
    font-weight: 700;
    text-align: center;
  }

  /* ── PAPER NAV TABS ─────────────────────────────────────────── */
  .paper-tabs {
    display: flex; flex-wrap: wrap; gap: .5rem;
    margin-bottom: 1.2rem;
  }
  .paper-tab {
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .45rem .9rem;
    cursor: pointer;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: .88rem;
    transition: background .2s, color .2s;
  }
  .paper-tab.active {
    background: var(--brown);
    color: var(--gold-light);
    border-color: var(--brown);
  }
  .paper-pane { display: none; }
  .paper-pane.active { display: block; }

  /* ── PRAKARANA TABS ──────────────────────────────────────────── */
  .prak-tabs {
    display: flex; flex-wrap: wrap; gap: .4rem;
    margin: 1rem 0 .8rem;
  }
  .prak-tab {
    background: #fff;
    border: 1.5px solid var(--gold);
    color: var(--brown-mid);
    border-radius: 20px;
    padding: .3rem .8rem;
    cursor: pointer;
    font-size: .88rem;
    transition: all .2s;
  }
  .prak-tab.active, .prak-tab:hover {
    background: var(--gold);
    color: var(--brown);
    border-color: var(--gold);
  }
  .prak-pane { display: none; }
  .prak-pane.active { display: block; animation: fadeUp .3s ease; }

  /* ── PRAKARANA DETAIL CARD ─────────────────────────────────── */
  .prak-detail {
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.1rem 1.3rem;
    font-size: .93rem;
  }
  .prak-detail strong { color: var(--red-accent); }

  /* ── INFO GRID ──────────────────────────────────────────────── */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: .7rem;
    margin: .8rem 0 1.2rem;
  }
  .info-chip {
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: .5rem .8rem;
    text-align: center;
    font-size: .85rem;
  }
  .info-chip .label { color: var(--brown-mid); font-size: .76rem; display: block; }
  .info-chip .val { color: var(--brown); font-weight: 700; font-size: 1rem; }

  /* ── OBJECTIVE LIST ─────────────────────────────────────────── */
  .obj-list {
    counter-reset: obj;
    padding: 0; list-style: none;
  }
  .obj-list li {
    counter-increment: obj;
    padding: .45rem .8rem .45rem 2.2rem;
    position: relative;
    border-bottom: 1px solid #f0dfc0;
    font-size: .93rem;
  }
  .obj-list li::before {
    content: counter(obj, devanagari);
    position: absolute; left: .4rem;
    color: var(--saffron); font-weight: 700;
  }

  /* ── REFERENCE BOX ──────────────────────────────────────────── */
  .ref-box {
    background: #fff8ee;
    border-left: 4px solid var(--gold);
    padding: .8rem 1rem;
    margin-top: .6rem;
    font-size: .88rem;
    border-radius: 0 4px 4px 0;
  }
  .ref-box h5 { color: var(--brown-mid); margin-bottom: .3rem; font-size: .9rem; }
  .ref-box li { margin-bottom: .2rem; }

  /* ── DIVIDER ────────────────────────────────────────────────── */
  .divider {
    border: none;
    border-top: 2px dashed var(--border);
    margin: 1.5rem 0;
  }

  /* ── FOOTER ─────────────────────────────────────────────────── */
  footer {
    background: var(--brown);
    color: var(--gold-light);
    text-align: center;
    padding: 1.2rem;
    font-size: .85rem;
    margin-top: 3rem;
  }
  footer span { color: var(--gold); }

  /* ── NAV DROPDOWN ────────────────────────────────────────────── */
  .nav-dd-wrap {
    display: inline-block;
    position: relative;
    vertical-align: top;
  }
  .nav-dd-btn {
    background: none;
    border: none;
    color: var(--gold-light);
    padding: .7rem 1.1rem;
    font-size: .88rem;
    font-family: 'Noto Sans Devanagari', sans-serif;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    transition: background .2s, color .2s;
    white-space: nowrap;
  }
  .nav-dd-btn:hover { background: var(--deep-gold); color: #fff; }
  .nav-dd-menu {
    display: none;
    position: fixed;   /* fixed so it escapes any overflow context */
    min-width: 300px;
    max-height: 70vh;
    overflow-y: auto;
    background: #2A1005;
    border: 1.5px solid var(--gold);
    border-radius: 0 0 8px 8px;
    box-shadow: 0 12px 32px rgba(0,0,0,.65);
    z-index: 9999;     /* highest — above everything */
  }
  .nav-dd-menu.open { display: block; }
  .nav-dd-item {
    display: flex;
    flex-direction: column;
    padding: .55rem 1rem;
    cursor: pointer;
    color: var(--gold-light);
    text-decoration: none;
    transition: background .15s;
    border-bottom: 1px solid rgba(201,169,110,.15);
    font-family: 'Noto Sans Devanagari', sans-serif;
  }
  .nav-dd-item:last-child { border-bottom: none; }
  .nav-dd-item:hover { background: var(--deep-gold); color: #fff; }
  .nav-dd-item-all {
    background: rgba(212,148,58,.12);
    color: var(--gold);
    font-weight: 600;
    font-size: .9rem;
    position: sticky; top: 0; z-index: 1;
  }
  .nav-dd-item-all:hover { background: var(--saffron); color: #fff; }
  .nav-dd-num { font-size: .82rem; font-weight: 600; color: var(--gold); }
  .nav-dd-sub { font-size: .78rem; color: #C9A96E; margin-top: .1rem; white-space: normal; line-height: 1.4; }
  .nav-dd-sep { height: 1px; background: rgba(201,169,110,.35); margin: .1rem 0; }

  /* ── SAMPLE QUESTIONS ────────────────────────────────────────── */
  .sq-meta-table {
    display: inline-grid;
    grid-template-columns: auto auto;
    gap: .05rem .8rem;
    margin-bottom: .7rem;
    font-size: .88rem;
    font-family: 'Noto Sans Devanagari', sans-serif;
  }
  .sq-meta-key {
    color: var(--brown-mid);
    font-weight: 500;
    white-space: nowrap;
  }
  .sq-meta-val {
    color: var(--text);
    font-weight: 600;
  }
  .sq-instructions {
    font-size: .86rem;
    color: var(--brown-mid);
    margin-bottom: .7rem;
  }
  .sq-instr-line { margin: .1rem 0; }
  .sq-group { margin-bottom: .9rem; }
  .sq-group-header {
    font-size: .92rem;
    font-weight: 600;
    color: var(--brown);
    margin: .7rem 0 .3rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: .5rem;
  }
  .sq-group-marks {
    font-weight: 700;
    color: var(--red-accent);
    font-size: .85rem;
    white-space: nowrap;
    font-family: 'Noto Sans Devanagari', sans-serif;
  }
  .sq-qlist {
    padding-left: 1.6rem;
    margin: 0;
  }
  .sq-q {
    font-size: .9rem;
    margin-bottom: .35rem;
    line-height: 1.7;
    color: var(--text);
  }
  .sq-q:last-child { margin-bottom: 0; }
  .sq-verse {
    display: block;
    font-style: italic;
    color: var(--brown-mid);
    padding-left: .8rem;
    border-left: 2px solid var(--gold-light);
    margin-top: .15rem;
    line-height: 1.85;
    font-size: .88rem;
  }
  .prak-tab-sarv {
    background: linear-gradient(90deg, var(--brown), var(--brown-mid)) !important;
    color: var(--gold-light) !important;
    border-color: var(--gold) !important;
    font-weight: 600;
  }
  .prak-tab-sarv.active, .prak-tab-sarv:hover {
    background: linear-gradient(90deg, var(--saffron), var(--deep-gold)) !important;
    color: #fff !important;
  }

  /* ── prak-pane: when all shown, add separator ─────────────────── */
  .prak-panes-wrap .prak-pane + .prak-pane {
    margin-top: .8rem;
    padding-top: .8rem;
    border-top: 1px dashed var(--border);
  }

  @media (max-width: 600px) {
    .nav-dd-menu { min-width: 240px; }
  }
  @media print {
    nav { display: none; }
    .card-body { display: block !important; }
    .section-card { break-inside: avoid; }
  }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: 1fr 1fr; }
    .card-header h3 { font-size: .93rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="om">ॐ</span>
    <span class="hd-sep">|</span>
    <h1 id="main-title"></h1>
    <span class="hd-sep">—</span>
    <h2 id="main-subtitle"></h2>
  </div>
</header>

<nav id="main-nav"><div class="nav-scroll"></div></nav>

<div class="container">

  <!-- §1 प्रवेशाहर्ता -->
  <section id="sec-pravesh">
    <div class="section-card">
      <div class="card-header open" onclick="toggleCard(this)">
        <h3 id="pravesh-heading"></h3>
        <span class="toggle">▼</span>
      </div>
      <div class="card-body open" id="pravesh-body"></div>
    </div>
  </section>

  <!-- §2 उद्देश्यानि -->
  <section id="sec-uddeshya">
    <div class="section-card">
      <div class="card-header open" onclick="toggleCard(this)">
        <h3 id="uddeshya-heading"></h3>
        <span class="toggle">▼</span>
      </div>
      <div class="card-body open" id="uddeshya-body"></div>
    </div>
  </section>

  <!-- §3 पाठ्यक्रमस्वरूपम् -->
  <section id="sec-svarupa">
    <div class="section-card">
      <div class="card-header open" onclick="toggleCard(this)">
        <h3>३. पाठ्यक्रमस्वरूपम्</h3>
        <span class="toggle">▼</span>
      </div>
      <div class="card-body open" id="svarupa-body"></div>
    </div>
  </section>

  <!-- Papers 1–5 -->
  <section id="sec-papers">
    <div class="section-card">
      <div class="card-header open" onclick="toggleCard(this)">
        <h3>पत्रविवरणम् — खण्डः प्रथमः (पत्र १–५)</h3>
        <span class="toggle">▼</span>
      </div>
      <div class="card-body open" id="papers-body"></div>
    </div>
  </section>

</div>

<footer>
  <span>आचार्यस्तरीयः पाठ्यक्रमः</span> — विषयः: इतिहासपुराणम् | खण्डः प्रथमः
</footer>

<script>
// ── helpers ───────────────────────────────────────────────────────
function toggleCard(hdr) {
  hdr.classList.toggle('open');
  hdr.nextElementSibling.classList.toggle('open');
}

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function makeTable(headers, rows, totalRow) {
  const wrap = el('div','table-wrap');
  const t = document.createElement('table');
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  headers.forEach(h => { const th = document.createElement('th'); th.innerHTML = h; hr.appendChild(th); });
  thead.appendChild(hr); t.appendChild(thead);
  const tbody = document.createElement('tbody');
  rows.forEach(r => {
    const tr = document.createElement('tr');
    r.forEach(c => { const td = document.createElement('td'); td.innerHTML = c; tr.appendChild(td); });
    tbody.appendChild(tr);
  });
  if (totalRow) {
    const tr = document.createElement('tr'); tr.className = 'total-row';
    totalRow.forEach(c => { const td = document.createElement('td'); td.innerHTML = c; tr.appendChild(td); });
    tbody.appendChild(tr);
  }
  t.appendChild(tbody); wrap.appendChild(t);
  return wrap;
}

// ── MAIN RENDER ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const d = syllabusData;

  // Header
  document.getElementById('main-title').textContent = d.title;
  document.getElementById('main-subtitle').textContent = d.subtitle;

  // Nav
  const nav = document.getElementById('main-nav');
  const navScroll = nav.querySelector('.nav-scroll');
  [
    ['#sec-pravesh','प्रवेशाहर्ता'],
    ['#sec-uddeshya','उद्देश्यानि'],
    ['#sec-svarupa','पाठ्यक्रमस्वरूपम्'],
  ].forEach(([href, label]) => {
    const a = document.createElement('a'); a.href = href; a.textContent = label;
    navScroll.appendChild(a);
  });

  // Paper dropdown in nav
  const ddWrap = document.createElement('div');
  ddWrap.className = 'nav-dd-wrap';
  const ddBtn = document.createElement('button');
  ddBtn.className = 'nav-dd-btn';
  ddBtn.id = 'nav-dd-btn';
  ddBtn.innerHTML = 'सर्व पत्राणि &#9662;';
  ddWrap.appendChild(ddBtn);
  const ddMenu = document.createElement('div');
  ddMenu.className = 'nav-dd-menu';
  ddMenu.id = 'nav-dd-menu';

  // "सर्व" option
  const allOpt = document.createElement('a');
  allOpt.className = 'nav-dd-item nav-dd-item-all';
  allOpt.textContent = 'सर्व पत्राणि (समस्तम्)';
  allOpt.dataset.pane = 'all';
  ddMenu.appendChild(allOpt);
  const ddSep = document.createElement('div');
  ddSep.className = 'nav-dd-sep';
  ddMenu.appendChild(ddSep);

  d.papers.forEach((p, i) => {
    const item = document.createElement('a');
    item.className = 'nav-dd-item';
    item.innerHTML = '<span class="nav-dd-num">पत\u094D\u0930 ' + (i+1) + '</span><span class="nav-dd-sub">' + p.pathyamshanam + '</span>';
    item.dataset.pane = 'pane-'+p.id;
    ddMenu.appendChild(item);
  });
  // Append menu to body so it's never clipped by any overflow context
  document.body.appendChild(ddMenu);
  ddWrap.appendChild(ddBtn);
  navScroll.appendChild(ddWrap);

  // Position dropdown under the button using fixed coords
  function positionDropdown() {
    const rect = ddBtn.getBoundingClientRect();
    ddMenu.style.top  = rect.bottom + 'px';
    ddMenu.style.left = rect.left + 'px';
  }

  ddBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const sqMenuEl = document.getElementById('nav-sq-menu');
    if (sqMenuEl) sqMenuEl.classList.remove('open');
    const isOpen = ddMenu.classList.contains('open');
    ddMenu.classList.toggle('open', !isOpen);
    if (!isOpen) positionDropdown();
  });
  document.addEventListener('click', () => ddMenu.classList.remove('open'));
  ddMenu.addEventListener('click', (e) => e.stopPropagation());
  window.addEventListener('resize', () => { if (ddMenu.classList.contains('open')) positionDropdown(); }, {passive:true});
  window.addEventListener('scroll', () => { if (ddMenu.classList.contains('open')) positionDropdown(); }, {passive:true});

  function activatePaper(paneId) {
    if (paneId === 'all') {
      document.querySelectorAll('.paper-pane').forEach(p => p.classList.add('active'));
      document.querySelectorAll('.paper-tab').forEach(t => t.classList.remove('active'));
      ddBtn.innerHTML = 'सर\u094D\u0935 पत\u094D\u0930ाणि &#9662;';
      document.getElementById('sec-papers').scrollIntoView({behavior:'smooth', block:'start'});
    } else {
      document.querySelectorAll('.paper-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.paper-tab').forEach(t => t.classList.remove('active'));
      const target = document.getElementById(paneId);
      if (target) {
        target.classList.add('active');
        const tab = document.querySelector('.paper-tab[data-pane="' + paneId + '"]');
        if (tab) tab.classList.add('active');
        const paperIdx = d.papers.findIndex(p => 'pane-'+p.id === paneId);
        ddBtn.innerHTML = 'पत\u094D\u0930 ' + (paperIdx+1) + ' &#9662;';
        target.scrollIntoView({behavior:'smooth', block:'start'});
      }
    }
    ddMenu.classList.remove('open');
  }

  ddMenu.querySelectorAll('.nav-dd-item').forEach(item => {
    item.addEventListener('click', () => activatePaper(item.dataset.pane));
  });

  // ── Sample Questions dropdown ────────────────────────────────
  const sqDdWrap = document.createElement('div');
  sqDdWrap.className = 'nav-dd-wrap';
  const sqDdBtn = document.createElement('button');
  sqDdBtn.className = 'nav-dd-btn';
  sqDdBtn.id = 'nav-sq-btn';
  sqDdBtn.innerHTML = 'निदर्शनप्रश्नपत्रम् &#9662;';
  sqDdWrap.appendChild(sqDdBtn);

  const sqMenu = document.createElement('div');
  sqMenu.className = 'nav-dd-menu';
  sqMenu.id = 'nav-sq-menu';
  document.body.appendChild(sqMenu);
  navScroll.appendChild(sqDdWrap);

  d.papers.forEach((p, i) => {
    const item = document.createElement('a');
    item.className = 'nav-dd-item';
    item.innerHTML = '<span class="nav-dd-num">पत\u094D\u0930 ' + (i+1) + ' — ' + p.patraName + '</span>'
      + '<span class="nav-dd-sub">' + p.pathyamshanam + '</span>';
    item.dataset.sqTarget = 'sq-'+p.id;
    item.dataset.paneTarget = 'pane-'+p.id;
    sqMenu.appendChild(item);
  });

  function positionSqDropdown() {
    const rect = sqDdBtn.getBoundingClientRect();
    sqMenu.style.top  = rect.bottom + 'px';
    sqMenu.style.left = rect.left + 'px';
  }

  sqDdBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    // Close other dropdown first
    ddMenu.classList.remove('open');
    const isOpen = sqMenu.classList.contains('open');
    sqMenu.classList.toggle('open', !isOpen);
    if (!isOpen) positionSqDropdown();
  });
  document.addEventListener('click', () => sqMenu.classList.remove('open'));
  sqMenu.addEventListener('click', (e) => e.stopPropagation());
  window.addEventListener('resize', () => { if (sqMenu.classList.contains('open')) positionSqDropdown(); }, {passive:true});
  window.addEventListener('scroll', () => { if (sqMenu.classList.contains('open')) positionSqDropdown(); }, {passive:true});

  sqMenu.querySelectorAll('.nav-dd-item').forEach(item => {
    item.addEventListener('click', () => {
      const paneId = item.dataset.paneTarget;
      const sqId   = item.dataset.sqTarget;
      sqMenu.classList.remove('open');

      // Make the paper pane visible first
      document.querySelectorAll('.paper-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.paper-tab').forEach(t => t.classList.remove('active'));
      const pane = document.getElementById(paneId);
      if (pane) {
        pane.classList.add('active');
        const tab = document.querySelector('.paper-tab[data-pane="' + paneId + '"]');
        if (tab) tab.classList.add('active');
        const paperIdx = d.papers.findIndex(p => 'pane-'+p.id === paneId);
        ddBtn.innerHTML = 'पत\u094D\u0930 ' + (paperIdx+1) + ' &#9662;';
      }
      // Also open the containing card-body if collapsed
      const sqEl = document.getElementById(sqId);
      if (sqEl) {
        let el = sqEl.parentElement;
        while (el) {
          if (el.classList.contains('card-body') && !el.classList.contains('open')) {
            el.classList.add('open');
            const hdr = el.previousElementSibling;
            if (hdr) hdr.classList.add('open');
          }
          el = el.parentElement;
        }
        setTimeout(() => sqEl.scrollIntoView({behavior:'smooth', block:'start'}), 60);
      }
    });
  });

  // §1 प्रवेशाहर्ता
  document.getElementById('pravesh-heading').textContent = d.section1.heading;
  const pb = document.getElementById('pravesh-body');
  d.section1.items.forEach(item => {
    pb.appendChild(el('p', '', `<strong>${item.label}</strong> ${item.text}`));
  });

  // §2 उद्देश्यानि
  document.getElementById('uddeshya-heading').textContent = d.section2.heading;
  const ub = document.getElementById('uddeshya-body');
  const ol = el('ol','obj-list');
  d.section2.items.forEach(i => { ol.appendChild(el('li','',i.text)); });
  ub.appendChild(ol);

  // §3 पाठ्यक्रमस्वरूपम्
  const sb = document.getElementById('svarupa-body');
  d.section3.khandas.forEach(kh => {
    sb.appendChild(el('h4','','खण्डः '+kh.name));
    const rows = kh.papers.map(p => [p.name, p.content, p.marks]);
    const total = ['','योगः', kh.total];
    sb.appendChild(makeTable(['पत्रम्','विषयः','अङ्काः'], rows, total));
  });
  sb.appendChild(el('p','',`<strong>महायोगः: ${d.section3.grandTotal} अङ्काः</strong>`));

  // Papers
  const papersBody = document.getElementById('papers-body');
  const tabBar = el('div','paper-tabs');
  papersBody.appendChild(tabBar);

  d.papers.forEach((paper, pi) => {
    // Tab button
    const tab = el('div','paper-tab', `पत्र ${pi+1} — ${paper.pathyamshanam}`);
    tab.dataset.pane = 'pane-'+paper.id;
    tab.addEventListener('click', () => activatePaper('pane-'+paper.id));
    tabBar.appendChild(tab);

    // Pane — all active by default (सर्व mode)
    const pane = el('div','paper-pane active');
    pane.id = 'pane-'+paper.id;
    pane.setAttribute('id', 'pane-'+paper.id);
    papersBody.appendChild(pane);

    // Anchor
    const anchor = document.createElement('div');
    anchor.id = 'paper-'+paper.id;
    pane.appendChild(anchor);

    // Title bar
    const titleBar = el('div','',`<h4 style="margin:0 0 .8rem;font-size:1.1rem;border-left:4px solid var(--saffron);padding-left:.7rem;color:var(--brown);">
      पत्र ${pi+1} — ${paper.patraName}<br>
      <span style="font-size:.9rem;font-weight:400;color:var(--brown-mid);">${paper.pathyamshanam}</span>
    </h4>`);
    pane.appendChild(titleBar);

    // Info chips
    const grid = el('div','info-grid');
    [{l:'खण्डः',v:paper.khanda},{l:'वार्षिकभारः',v:paper.varshikBhar},
     {l:'पूर्णाङ्काः',v:paper.purnankas},{l:'उत्तीर्णाङ्काः',v:paper.uttirnankas},
     {l:'समयः',v:paper.samaya}].forEach(({l,v}) => {
      grid.appendChild(el('div','info-chip',`<span class="label">${l}</span><span class="val">${v}</span>`));
    });
    pane.appendChild(grid);

    // परिचय
    if(paper.parichaya) {
      pane.appendChild(el('h4','','२. पाठ्यांशपरिचयः'));
      pane.appendChild(el('p','',paper.parichaya));
    }

    // Prakarana intro list
    if(paper.prakarana_intro) {
      pane.appendChild(el('h4','','प्रकरणसंक्षेपः'));
      paper.prakarana_intro.forEach(pr => {
        pane.appendChild(el('p','',`<strong>${pr.id}-प्रकरणे–</strong> ${pr.text}`));
      });
    }

    // सामान्योद्देश्यानि
    if(paper.samanya_uddeshya) {
      pane.appendChild(el('h4','','३. पाठ्यांशस्य सामान्योद्देश्यानि'));
      pane.appendChild(el('p','',paper.samanya_uddeshya.intro));
      const ul = el('ul');
      paper.samanya_uddeshya.items.forEach(i => ul.appendChild(el('li','',i)));
      pane.appendChild(ul);
    }

    // विशिष्टोद्देश्यानि
    if(paper.vishishtha_uddeshya) {
      pane.appendChild(el('h4','','४. पाठ्यांशस्य विशिष्टोद्देश्यानि'));
      paper.vishishtha_uddeshya.forEach(u => {
        pane.appendChild(el('p','',`<strong>${u.label}</strong> ${u.text}`));
      });
    }

    // प्रकरणविभाग table
    if(paper.prakarana_table) {
      pane.appendChild(el('h4','','५. प्रकरणविभागः पाठ्यवस्तुविवरणञ्च'));
      const rows = paper.prakarana_table.map(r => [r.id, r.content, r.ankah, r.pathah]);
      const totalAnkah = paper.prakarana_table.reduce((s,r)=>s+parseInt(r.ankah||0),0);
      const totalPathah = paper.prakarana_table.reduce((s,r)=>s+parseInt(r.pathah||0),0);
      pane.appendChild(makeTable(
        ['प्रकरणानि','पाठ्यांशाः','अङ्काः','पाठाः'],
        rows,
        ['','योगः', totalAnkah+'', totalPathah+'']
      ));
    }

    // पाठ्यवस्तुविवरणम् (detailed)
    if(paper.vastuvivarana) {
      pane.appendChild(el('h4','','६. पाठ्यवस्तुविवरणम्'));

      const prakTabs = el('div','prak-tabs');
      const prakPanes = el('div','prak-panes-wrap');
      pane.appendChild(prakTabs);
      pane.appendChild(prakPanes);

      // सर्व tab — default
      const sarvTab = el('div','prak-tab prak-tab-sarv active', 'सर्व प्रकरणे');
      sarvTab.dataset.pane = 'sarv';
      prakTabs.appendChild(sarvTab);

      paper.vastuvivarana.forEach((v, vi) => {
        const ptab = el('div','prak-tab', v.id+'-प्रकरणे');
        ptab.dataset.pane = 'pp-'+paper.id+'-'+v.id;
        prakTabs.appendChild(ptab);

        const ppane = el('div','prak-pane active');  // all active by default
        ppane.id = 'pp-'+paper.id+'-'+v.id;

        const detail = el('div','prak-detail');
        detail.appendChild(el('p','',`<strong>${v.title}</strong>`));
        if(v.intro) detail.appendChild(el('p','',v.intro));
        if(v.topics) detail.appendChild(el('p','',v.topics));
        if(v.subheading) detail.appendChild(el('p','',`<strong>${v.subheading}</strong>`));
        if(v.topics2) { detail.appendChild(el('p','',v.topics2)); }
        if(v.subheading2) detail.appendChild(el('p','',`<strong>${v.subheading2}</strong>`));

        ppane.appendChild(detail);
        prakPanes.appendChild(ppane);
      });

      // Tab click handler for prakarana tabs
      prakTabs.addEventListener('click', (e) => {
        const clickedTab = e.target.closest('.prak-tab');
        if (!clickedTab) return;
        const targetPane = clickedTab.dataset.pane;

        prakTabs.querySelectorAll('.prak-tab').forEach(t => t.classList.remove('active'));
        clickedTab.classList.add('active');

        if (targetPane === 'sarv') {
          prakPanes.querySelectorAll('.prak-pane').forEach(p => p.classList.add('active'));
        } else {
          prakPanes.querySelectorAll('.prak-pane').forEach(p => p.classList.remove('active'));
          const target = document.getElementById(targetPane);
          if (target) target.classList.add('active');
        }
      });
    }

    pane.appendChild(el('hr','divider'));

    // Exam Pattern
    if(paper.examPattern) {
      pane.appendChild(el('h4','','वार्षिकपरीक्षाप्रश्नपत्रनिर्माणसारणी'));
      const rows = paper.examPattern.prakaranaGroups.map(g =>
        [g.prakaranas, g.type, g.prashthya, g.samadheya, g.perQ, g.total]
      );
      pane.appendChild(makeTable(
        ['समूहाः (प्रकरणानि)','प्रश्नप्रकाराः','प्रष्टव्याः','समाधेयाः','प्रतिप्रश्मङ्काः','पूर्णाङ्काः'],
        rows,
        ['','योगः','१५','१०','–','८०']
      ));
    }

    pane.appendChild(el('hr','divider'));

    // Sample Question Paper
    if(paper.sampleQuestions) {
      const sq = paper.sampleQuestions;

      // Anchor for nav jump
      const sqAnchor = document.createElement('div');
      sqAnchor.id = 'sq-'+paper.id;
      pane.appendChild(sqAnchor);

      pane.appendChild(el('h4','','निदर्शनप्रश्नपत्रम्'));

      // Meta — compact 2-column grid (no boxes, no chips)
      const sqMeta = el('div','sq-meta-table');
      [
        ['परीक्षा',       sq.meta.pariksha],
        ['खण्डः',        sq.meta.khanda],
        ['पत्रम्',       sq.meta.patra],
        ['पूर्णाङ्काः',   sq.meta.purnankas],
        ['उत्तीर्णाङ्काः', sq.meta.uttirnankas],
        ['समयः',         sq.meta.samaya],
      ].forEach(([k, v]) => {
        sqMeta.appendChild(el('span','sq-meta-key', k));
        sqMeta.appendChild(el('span','sq-meta-val', v));
      });
      pane.appendChild(sqMeta);

      // Instructions
      const sqInstr = el('div','sq-instructions');
      sq.instructions.forEach(ins => sqInstr.appendChild(el('p','sq-instr-line', ins)));
      pane.appendChild(sqInstr);

      // Question groups
      sq.groups.forEach((grp) => {
        const grpDiv = el('div','sq-group');

        const grpHdr = el('div','sq-group-header');
        grpHdr.appendChild(el('span','', grp.label));
        grpHdr.appendChild(el('span','sq-group-marks', grp.marks));
        grpDiv.appendChild(grpHdr);

        const ol = el('ol','sq-qlist');
        grp.questions.forEach(q => {
          const li = document.createElement('li');
          li.className = 'sq-q';
          if (q.includes('।') && q.includes('–')) {
            const parts = q.split('–');
            const prompt = parts[0] + '–';
            const verse = parts.slice(1).join('–').trim();
            li.innerHTML = `${prompt}<br><span class="sq-verse">${verse.replace(/\n/g,'<br>')}</span>`;
          } else {
            li.textContent = q;
          }
          ol.appendChild(li);
        });
        grpDiv.appendChild(ol);
        pane.appendChild(grpDiv);
      });
    }

    pane.appendChild(el('hr','divider'));

    // References
    if(paper.references) {
      pane.appendChild(el('h4','','पाठ्यसामग्रीसूची'));
      const ref = paper.references;
      const refBox = el('div','ref-box');

      if(ref.pathya) {
        refBox.appendChild(el('h5','','(क) पाठ्यग्रन्थाः'));
        const ul = el('ul'); ref.pathya.forEach(r => ul.appendChild(el('li','',r))); refBox.appendChild(ul);
      }
      if(ref.sahayak) {
        refBox.appendChild(el('h5','','(ख) सहायकग्रन्थाः'));
        const ul = el('ul'); ref.sahayak.forEach(r => ul.appendChild(el('li','',r))); refBox.appendChild(ul);
      }
      if(ref.sandarbha) {
        refBox.appendChild(el('h5','','(ग) सन्दर्भग्रन्थाः'));
        const ul = el('ul'); ref.sandarbha.forEach(r => ul.appendChild(el('li','',r))); refBox.appendChild(ul);
      }
      pane.appendChild(refBox);
    }
  }); // end papers.forEach
});
</script>
<script src="search.js"></script>
</body>
</html>
